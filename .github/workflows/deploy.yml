name: Deploy Backend to VPS

# Déploiement automatique : à chaque push sur main, GitHub se connecte au VPS
# via SSH (client natif), récupère le code et redémarre le backend (pm2).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    # Anti-blocage : un run SSH figé mourrait sinon indéfiniment et bloquerait TOUS les
    # déploiements suivants (concurrency group + cancel-in-progress:false = file d'attente).
    timeout-minutes: 10
    steps:
      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GCS_SA_B64: ${{ secrets.GCS_SA_B64 }}
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
          AGORA_APP_ID: ${{ secrets.AGORA_APP_ID }}
          AGORA_APP_CERTIFICATE: ${{ secrets.AGORA_APP_CERTIFICATE }}
          AGORA_CUSTOMER_ID: ${{ secrets.AGORA_CUSTOMER_ID }}
          AGORA_CUSTOMER_SECRET: ${{ secrets.AGORA_CUSTOMER_SECRET }}
          GCS_HMAC_ACCESS_KEY: ${{ secrets.GCS_HMAC_ACCESS_KEY }}
          GCS_HMAC_SECRET: ${{ secrets.GCS_HMAC_SECRET }}
          # Rotation clé Supabase (fuite historique git de la legacy service_role) :
          # poser le secret GitHub SUPABASE_SERVICE_ROLE_KEY = nouvelle clé sb_secret_…
          # → injectée dans le .env du VPS au prochain déploiement. Vide = no-op.
          SUPABASE_SERVICE_ROLE_KEY_NEW: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Diagnostic /api/version : SHA + horodatage du commit réellement déployé (pas des secrets).
          GIT_SHA: ${{ github.sha }}
          GIT_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          # Script exécuté sur le VPS via stdin (évite l'enfer des quotes).
          # ${GCS_SA_B64} est développé ICI (runner) depuis le secret, puis écrit
          # dans le .env du VPS s'il n'y est pas déjà (idempotent).
          cat > /tmp/remote_deploy.sh <<REMOTE
          set -e
          cd /var/www/backend
          grep -q '^GOOGLE_CLOUD_SERVICE_ACCOUNT_B64=' .env || echo "GOOGLE_CLOUD_SERVICE_ACCOUNT_B64=${GCS_SA_B64}" >> .env
          grep -q '^GCS_BUCKET_NAME=' .env || echo "GCS_BUCKET_NAME=224solutions" >> .env
          # Corriger la limite de requêtes (ancienne conf 100/15min = « Trop de requêtes »
          # pour tout le monde). Cible : 6000 requêtes / 60 s par IP.
          if grep -q '^RATE_LIMIT_MAX_REQUESTS=' .env; then sed -i 's|^RATE_LIMIT_MAX_REQUESTS=.*|RATE_LIMIT_MAX_REQUESTS=6000|' .env; else echo 'RATE_LIMIT_MAX_REQUESTS=6000' >> .env; fi
          if grep -q '^RATE_LIMIT_WINDOW_MS=' .env; then sed -i 's|^RATE_LIMIT_WINDOW_MS=.*|RATE_LIMIT_WINDOW_MS=60000|' .env; else echo 'RATE_LIMIT_WINDOW_MS=60000' >> .env; fi
          # Ably (temps reel). Depuis le secret GitHub ABLY_API_KEY, developpe ICI (runner).
          # Ecriture robuste : on supprime toute ancienne ligne puis on reecrit (gere la mise
          # a jour de cle sans casse sed sur les caracteres speciaux). Ne fait rien si le secret
          # est vide (backend reste alors sur Supabase Realtime par defaut).
          if [ -n "${ABLY_API_KEY}" ]; then sed -i '/^ABLY_API_KEY=/d' .env; echo "ABLY_API_KEY=${ABLY_API_KEY}" >> .env; fi
          # Agora (appels + live). Certificat = source de verite backend (token signe cote Node).
          # Meme ecriture robuste que Ably (supprime puis reecrit ; ne fait rien si secret vide).
          if [ -n "${AGORA_APP_ID}" ]; then sed -i '/^AGORA_APP_ID=/d' .env; echo "AGORA_APP_ID=${AGORA_APP_ID}" >> .env; fi
          if [ -n "${AGORA_APP_CERTIFICATE}" ]; then sed -i '/^AGORA_APP_CERTIFICATE=/d' .env; echo "AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE}" >> .env; fi
          # Agora Cloud Recording (replay serveur) + cle HMAC GCS (ecriture S3-compatible par Agora).
          # Meme ecriture robuste (supprime puis reecrit = rotation OK ; rien si secret vide —
          # l'enregistrement serveur reste alors desactive, repli client). JAMAIS de valeur loguee.
          if [ -n "${AGORA_CUSTOMER_ID}" ]; then sed -i '/^AGORA_CUSTOMER_ID=/d' .env; echo "AGORA_CUSTOMER_ID=${AGORA_CUSTOMER_ID}" >> .env; fi
          if [ -n "${AGORA_CUSTOMER_SECRET}" ]; then sed -i '/^AGORA_CUSTOMER_SECRET=/d' .env; echo "AGORA_CUSTOMER_SECRET=${AGORA_CUSTOMER_SECRET}" >> .env; fi
          if [ -n "${GCS_HMAC_ACCESS_KEY}" ]; then sed -i '/^GCS_HMAC_ACCESS_KEY=/d' .env; echo "GCS_HMAC_ACCESS_KEY=${GCS_HMAC_ACCESS_KEY}" >> .env; fi
          if [ -n "${GCS_HMAC_SECRET}" ]; then sed -i '/^GCS_HMAC_SECRET=/d' .env; echo "GCS_HMAC_SECRET=${GCS_HMAC_SECRET}" >> .env; fi
          # Rotation Supabase : remplace la clé service (legacy fuitée) par la sb_secret du
          # secret GitHub SUPABASE_SERVICE_ROLE_KEY. Rien si secret vide. JAMAIS loguée.
          if [ -n "${SUPABASE_SERVICE_ROLE_KEY_NEW}" ]; then sed -i '/^SUPABASE_SERVICE_ROLE_KEY=/d' .env; echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY_NEW}" >> .env; fi
          git fetch origin main
          git reset --hard origin/main
          # Diagnostic : écrit le SHA/branche/horodatage du commit déployé dans .env → /api/version.
          sed -i '/^GIT_COMMIT_SHA=/d' .env; echo "GIT_COMMIT_SHA=${GIT_SHA}" >> .env
          sed -i '/^GIT_BRANCH=/d' .env; echo "GIT_BRANCH=main" >> .env
          if [ -n "${GIT_BUILD_TIME}" ]; then sed -i '/^BUILD_TIME=/d' .env; echo "BUILD_TIME=${GIT_BUILD_TIME}" >> .env; fi
          npm install --no-audit --no-fund
          # Redemarrage ROBUSTE (14 juil 2026) : un simple 'pm2 restart' NE RÉCUPÈRE PAS un
          # process zombie/crash-loop (incident : 621 restarts, ancien code servi → prod bloquée).
          # On recrée le process proprement via 'npm start' (npx tsx src/server.ts). Idempotent.
          pm2 delete 224-backend >/dev/null 2>&1 || true
          pm2 start npm --name 224-backend -- start
          pm2 describe 224-worker >/dev/null 2>&1 && pm2 restart 224-worker --update-env || true
          pm2 save
          # Preuve immédiate : /api/version doit répondre le SHA fraîchement déployé.
          sleep 8
          curl -s -m 8 http://localhost:3001/api/version || echo "WARN: /api/version muet après deploy"
          echo DEPLOY_OK
          REMOTE
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=20 "$VPS_USER@$VPS_HOST" 'bash -s' < /tmp/remote_deploy.sh
